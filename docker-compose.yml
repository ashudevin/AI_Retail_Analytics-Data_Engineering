# =============================================================================
# AI-Powered Retail Analytics — Production Docker Compose (Phase 7)
# =============================================================================
# Start entire platform:
#   docker compose up --build -d
#
# Manual one-shot pipeline (without Airflow UI):
#   docker compose run --rm pipeline-runner
#
# URLs:
#   Dashboard : http://localhost:3000
#   Airflow UI: http://localhost:8080  (airflow / airflow)
# =============================================================================

name: retail-analytics

x-data-volumes: &data-volumes
  - retail-processed:/app/data/processed
  - retail-ai-insights:/app/data/ai_insights
  - retail-frontend-data:/app/frontend/public/data
  - ./data/raw:/app/data/raw:ro

x-airflow-volumes: &airflow-volumes
  - ./airflow/dags:/opt/airflow/dags
  - ./airflow/config:/opt/airflow/config
  - airflow-logs:/opt/airflow/logs
  - retail-processed:/opt/airflow/project/data/processed
  - retail-ai-insights:/opt/airflow/project/data/ai_insights
  - retail-frontend-data:/opt/airflow/project/frontend/public/data
  - ./data/raw:/opt/airflow/project/data/raw:ro
  # Dev: mount live source without rebuilding the image
  - ./src:/opt/airflow/project/src:ro

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres:5432/airflow
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
  RETAIL_ANALYTICS_ROOT: /opt/airflow/project
  PYTHONPATH: /opt/airflow:/opt/airflow/project
  RETAIL_DAG_SCHEDULE: ${RETAIL_DAG_SCHEDULE:-0 6 * * *}
  RETAIL_ENV_FILE: /opt/airflow/project/.env
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  VIRTUAL_ENV: /home/airflow/.local
  RETAIL_ANALYTICS_DOCKER: "1"
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  _PIP_ADDITIONAL_REQUIREMENTS: ""

x-etl-env: &etl-env
  RETAIL_ANALYTICS_ROOT: /app
  PYTHONPATH: /app
  RETAIL_ENV_FILE: /app/.env
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  VIRTUAL_ENV: /usr/local
  RETAIL_ANALYTICS_DOCKER: "1"
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Airflow metadata database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: retail-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airflow} -d ${POSTGRES_DB:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - retail-net

  # ---------------------------------------------------------------------------
  # Airflow Init — DB migration + admin user (runs once)
  # ---------------------------------------------------------------------------
  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: retail-analytics-airflow:latest
    container_name: retail-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER:-airflow} \
          --password ${AIRFLOW_ADMIN_PASSWORD:-airflow} \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} || true
        echo "Airflow initialization complete."
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
    volumes: *airflow-volumes
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - retail-net
    restart: "no"

  # ---------------------------------------------------------------------------
  # Airflow Webserver — pipeline orchestration UI
  # ---------------------------------------------------------------------------
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: retail-analytics-airflow:latest
    container_name: retail-airflow-webserver
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8082}:8080"
    env_file:
      - path: .env
        required: false
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - retail-net

  # ---------------------------------------------------------------------------
  # Airflow Scheduler — executes DAG tasks
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: retail-analytics-airflow:latest
    container_name: retail-airflow-scheduler
    command: scheduler
    env_file:
      - path: .env
        required: false
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $$(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - retail-net

  # ---------------------------------------------------------------------------
  # Pipeline Runner — manual full-pipeline execution (ETL image)
  # Usage: docker compose run --rm pipeline-runner
  # ---------------------------------------------------------------------------
  pipeline-runner:
    build:
      context: .
      dockerfile: docker/etl/Dockerfile
    image: retail-analytics-etl:latest
    container_name: retail-pipeline-runner
    profiles:
      - manual
    command: ["run_pipeline.sh"]
    env_file:
      - path: .env
        required: false
    environment:
      <<: *etl-env
    volumes:
      - retail-processed:/app/data/processed
      - retail-ai-insights:/app/data/ai_insights
      - retail-frontend-data:/app/frontend/public/data
      - ./data/raw:/app/data/raw:ro
      - ./src:/app/src:ro
    networks:
      - retail-net

  # ---------------------------------------------------------------------------
  # ETL Worker — idle service for exec / debugging
  # Usage: docker compose exec etl-worker run_pipeline.sh
  # ---------------------------------------------------------------------------
  etl-worker:
    build:
      context: .
      dockerfile: docker/etl/Dockerfile
    image: retail-analytics-etl:latest
    container_name: retail-etl-worker
    env_file:
      - path: .env
        required: false
    environment:
      <<: *etl-env
    volumes:
      - retail-processed:/app/data/processed
      - retail-ai-insights:/app/data/ai_insights
      - retail-frontend-data:/app/frontend/public/data
      - ./data/raw:/app/data/raw:ro
      - ./src:/app/src:ro
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "java -version && python --version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - retail-net

  # ---------------------------------------------------------------------------
  # Next.js Dashboard — analytics frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: retail-analytics-frontend:latest
    container_name: retail-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      DASHBOARD_DATA_DIR: /app/public/data
      NODE_ENV: production
    volumes:
      - retail-frontend-data:/app/public/data:ro
    depends_on:
      airflow-webserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    networks:
      - retail-net

networks:
  retail-net:
    driver: bridge

volumes:
  postgres-data:
    name: retail-postgres-data
  airflow-logs:
    name: retail-airflow-logs
  retail-processed:
    name: retail-processed-data
  retail-ai-insights:
    name: retail-ai-insights-data
  retail-frontend-data:
    name: retail-frontend-data
